<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e0a0f"/>
      <stop offset="100%" style="stop-color:#3e1520"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e63946"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" fill="#e63946" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="bold">System Architecture</text>

  <!-- User Input -->
  <rect x="30" y="55" width="150" height="80" rx="10" fill="#1e293b" stroke="#e63946" stroke-width="2"/>
  <text x="105" y="78" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">👤 Gift Seeker</text>
  <text x="105" y="95" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">14 Occasions</text>
  <text x="105" y="110" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">10 Relationships</text>
  <text x="105" y="125" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Budget • Interests • Age</text>

  <line x1="180" y1="95" x2="220" y2="95" stroke="#e63946" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Recommendation Engine -->
  <rect x="225" y="45" width="180" height="100" rx="10" fill="#1e293b" stroke="#e63946" stroke-width="2"/>
  <text x="315" y="70" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">🎁 Gift Engine</text>
  <text x="315" y="88" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">generate_recommendations()</text>
  <text x="315" y="103" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">get_gift_details()</text>
  <text x="315" y="118" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">compare_prices()</text>
  <text x="315" y="133" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">5-7 curated ideas</text>

  <line x1="405" y1="95" x2="445" y2="95" stroke="#e63946" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="450" y="60" width="155" height="70" rx="10" fill="#d62828" stroke="#e63946" stroke-width="2"/>
  <text x="527" y="87" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">🤖 Gemma 4</text>
  <text x="527" y="107" text-anchor="middle" fill="#fecdd3" font-family="Segoe UI,Arial,sans-serif" font-size="11">Ollama Local LLM</text>

  <!-- Wishlist -->
  <rect x="30" y="180" width="150" height="60" rx="10" fill="#1e293b" stroke="#d62828" stroke-width="2"/>
  <text x="105" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📋 Wishlists</text>
  <text x="105" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">add/get/mark_purchased()</text>

  <!-- Calendar -->
  <rect x="225" y="180" width="180" height="60" rx="10" fill="#1e293b" stroke="#d62828" stroke-width="2"/>
  <text x="315" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">📅 Occasion Calendar</text>
  <text x="315" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">add/get_upcoming_occasions()</text>

  <!-- Price Comparison -->
  <rect x="450" y="180" width="155" height="60" rx="10" fill="#1e293b" stroke="#d62828" stroke-width="2"/>
  <text x="527" y="205" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💲 Price Compare</text>
  <text x="527" y="225" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Across retailers</text>

  <!-- Storage -->
  <rect x="645" y="140" width="130" height="100" rx="10" fill="#1e293b" stroke="#e63946" stroke-width="2"/>
  <text x="710" y="165" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="bold">💾 Storage</text>
  <text x="710" y="185" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">wishlists.json</text>
  <text x="710" y="201" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">occasion_calendar.json</text>
  <text x="710" y="217" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Per-person tracking</text>

  <!-- Interfaces -->
  <rect x="30" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#e63946" stroke-width="2"/>
  <text x="145" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🖥️ CLI (Multi-command)</text>
  <text x="145" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">recommend | wishlist-add/show</text>
  <text x="145" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">calendar-add/show • --occasion --budget</text>

  <rect x="300" y="285" width="230" height="70" rx="10" fill="#1e293b" stroke="#e63946" stroke-width="2"/>
  <text x="415" y="310" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="bold">🌐 Web UI (3 Tabs)</text>
  <text x="415" y="327" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Recommendations | Wishlists | Calendar</text>
  <text x="415" y="343" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="10">Price Compare • Purchase Tracking</text>

  <text x="400" y="385" text-anchor="middle" fill="#4a5568" font-family="Segoe UI,Arial,sans-serif" font-size="11">Gift Recommendation Bot — 14 Occasions • 10 Relationships • Wishlists • Calendar</text>
</svg>
