      <stop offset="0%" style="stop-color:#2e0a0f"/>
      <stop offset="100%" style="stop-color:#3e1520"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" text-anchor="middle" fill="#e63946" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="bold">✨ Key Features</text>

  <rect x="20" y="55" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
