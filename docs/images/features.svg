  <rect x="20" y="195" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="140" y="225" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="28">📅</text>
  <text x="140" y="250" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">Occasion Calendar</text>
  <text x="140" y="270" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">Never miss a birthday or</text>
  <text x="140" y="285" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">anniversary again</text>

  <rect x="280" y="195" width="240" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="400" y="225" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="28">🎯</text>
  <text x="400" y="250" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="bold">14 Occasions</text>
  <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI,Arial,sans-serif" font-size="11">Birthday, Wedding, Christmas,</text>
